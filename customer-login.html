<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Đăng nhập – Quà Tặng Yêu Thương</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--rose:#B5344A;--rose-light:#F9EEF0;--gold:#C9901A;--gold-light:#FDF3E0;--cream:#FDFAF6;--dark:#2A1A1F;--muted:#7A5C62;--white:#fff;--border:#EDD9DC;--green:#2E7D52;--green-light:#E8F5EE;--blue:#1a6fc9;--font-display:'Playfair Display',Georgia,serif;--font-body:'Be Vietnam Pro',sans-serif}
body{font-family:var(--font-body);background:var(--cream);color:var(--dark);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--white);border-bottom:1px solid var(--border);padding:0 5%}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:60px}
.logo{font-family:var(--font-display);font-size:1.2rem;color:var(--rose);font-style:italic;text-decoration:none}
.logo span{color:var(--gold);font-style:normal}
.back-link{color:var(--muted);font-size:.84rem;text-decoration:none}
.back-link:hover{color:var(--rose)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-wrap{width:100%;max-width:460px}
.auth-head{text-align:center;margin-bottom:1.8rem}
.auth-head .icon{font-size:2.6rem;margin-bottom:.7rem}
.auth-head h1{font-family:var(--font-display);font-size:1.7rem;margin-bottom:.35rem}
.auth-head p{color:var(--muted);font-size:.86rem}
.tabs{display:flex;background:var(--rose-light);border-radius:50px;padding:.22rem;margin-bottom:1.6rem;border:1px solid var(--border)}
.tab{flex:1;padding:.58rem;text-align:center;border-radius:50px;cursor:pointer;font-size:.84rem;font-weight:600;color:var(--muted);transition:all .2s;user-select:none}
.tab.active{background:var(--white);color:var(--rose);box-shadow:0 2px 8px rgba(181,52,74,.12)}
.card{background:var(--white);border-radius:18px;padding:1.8rem;border:1px solid var(--border);box-shadow:0 4px 24px rgba(42,26,31,.07)}
.form-group{margin-bottom:.9rem}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--dark);margin-bottom:.32rem}
.form-group input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.62rem .88rem;font-family:var(--font-body);font-size:.86rem;outline:none;transition:border .2s;background:var(--cream);color:var(--dark)}
.form-group input:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(181,52,74,.08)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.submit-btn{width:100%;background:var(--rose);color:#fff;border:none;padding:.82rem;border-radius:12px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:var(--font-body);transition:all .2s;margin-top:.4rem}
.submit-btn:hover{background:#9a2a3e}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{border-radius:9px;padding:.72rem .9rem;font-size:.8rem;margin-bottom:.9rem;display:none;line-height:1.55}
.msg-err{background:#fde8ec;border:1px solid #f5c6cc;color:#721c24}
.msg-ok{background:var(--green-light);border:1px solid #c6e8d5;color:var(--green)}
.divider{text-align:center;color:var(--muted);font-size:.78rem;margin:.85rem 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.social-hint{background:var(--gold-light);border:1px solid #e5c97a;border-radius:12px;padding:1rem;margin-top:1.4rem;font-size:.8rem;color:var(--dark);text-align:center;line-height:1.65}
.social-hint strong{color:var(--gold);display:block;margin-bottom:.3rem}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">Quà Tặng <span>Yêu Thương</span></a>
    <a href="index.html" class="back-link">← Về trang chủ</a>
  </div>
</nav>
<main>
  <div class="auth-wrap">
    <div class="auth-head">
      <div class="icon">👤</div>
      <h1>Tài khoản của bạn</h1>
      <p>Đăng nhập để theo dõi đơn hàng và nhận ưu đãi</p>
    </div>
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Đăng nhập</div>
      <div class="tab" id="tabReg" onclick="switchTab('register')">Đăng ký</div>
    </div>

    <!-- ĐĂNG NHẬP -->
    <div id="formLogin">
      <div class="card">
        <div class="msg msg-err" id="loginErr"></div>
        <div class="msg msg-ok"  id="loginOk"></div>
        <div class="form-group"><label>📧 Email</label><input type="email" id="lEmail" placeholder="ban@email.com"/></div>
        <div class="form-group"><label>🔒 Mật khẩu</label><input type="password" id="lPwd" placeholder="Nhập mật khẩu"/></div>
        <button class="submit-btn" id="loginBtn" onclick="doLogin()">🔑 Đăng nhập</button>
      </div>
    </div>

    <!-- ĐĂNG KÝ -->
    <div id="formReg" style="display:none">
      <div class="card">
        <div class="msg msg-err" id="regErr"></div>
        <div class="msg msg-ok"  id="regOk"></div>
        <div class="form-group"><label>👤 Họ và tên *</label><input type="text" id="rName" placeholder="Nguyễn Văn A"/></div>
        <div class="form-row">
          <div class="form-group"><label>📧 Email *</label><input type="email" id="rEmail" placeholder="ban@email.com"/></div>
          <div class="form-group"><label>📞 Số điện thoại</label><input type="tel" id="rPhone" placeholder="0901 234 567"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>🔒 Mật khẩu *</label><input type="password" id="rPwd" placeholder="Tối thiểu 6 ký tự"/></div>
          <div class="form-group"><label>🔒 Xác nhận *</label><input type="password" id="rPwd2" placeholder="Nhập lại"/></div>
        </div>
        <button class="submit-btn" id="regBtn" onclick="doRegister()">🚀 Tạo tài khoản</button>
      </div>
    </div>

    <div class="social-hint">
      <strong>🎁 Lợi ích khi có tài khoản</strong>
      Theo dõi đơn hàng theo thời gian thực • Lưu địa chỉ giao hàng •
      Nhận thông báo Flash Sale sớm nhất • Tích lũy điểm thưởng
    </div>
  </div>
</main>

<script src="config.js"></script>
<script>
let db;
loadSupabaseLib(c => {
  db = c;
  // Nếu đã đăng nhập thì chuyển về trang cá nhân
  if (getCustomer()) window.location.href = 'customer-account.html';
});

function switchTab(t) {
  document.querySelectorAll('.msg').forEach(e => e.style.display='none');
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabReg').classList.toggle('active', t==='register');
  document.getElementById('formLogin').style.display = t==='login' ? 'block' : 'none';
  document.getElementById('formReg').style.display   = t==='register' ? 'block' : 'none';
}

function showMsg(id, msg) {
  document.querySelectorAll('.msg').forEach(e => e.style.display='none');
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

async function doLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pwd   = document.getElementById('lPwd').value;
  if (!email||!pwd) { showMsg('loginErr','⚠️ Vui lòng nhập email và mật khẩu!'); return; }
  if (!db) { showMsg('loginErr','⚠️ Đang tải, thử lại!'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled=true; btn.textContent='⏳ Đang đăng nhập...';
  try {
    const hash = await hashPwd(pwd);
    const { data, error } = await db.from('customers').select('*').eq('email',email).eq('password_hash',hash).single();
    if (error||!data) throw new Error('Email hoặc mật khẩu không đúng!');
    setCustomer({ id:data.id, name:data.name, email:data.email, phone:data.phone||'', address:data.address||'' });
    showMsg('loginOk','✅ Đăng nhập thành công! Đang chuyển trang...');
    setTimeout(() => window.location.href = 'customer-account.html', 900);
  } catch(e) {
    showMsg('loginErr','❌ ' + e.message);
    btn.disabled=false; btn.textContent='🔑 Đăng nhập';
  }
}

async function doRegister() {
  const name  = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const phone = document.getElementById('rPhone').value.trim();
  const pwd   = document.getElementById('rPwd').value;
  const pwd2  = document.getElementById('rPwd2').value;
  if (!name)             { showMsg('regErr','⚠️ Vui lòng nhập họ tên!'); return; }
  if (!email||!email.includes('@')) { showMsg('regErr','⚠️ Email không hợp lệ!'); return; }
  if (pwd.length < 6)    { showMsg('regErr','⚠️ Mật khẩu tối thiểu 6 ký tự!'); return; }
  if (pwd !== pwd2)      { showMsg('regErr','⚠️ Mật khẩu xác nhận không khớp!'); return; }
  if (!db) { showMsg('regErr','⚠️ Đang tải, thử lại!'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled=true; btn.textContent='⏳ Đang tạo tài khoản...';
  try {
    const hash = await hashPwd(pwd);
    const { data, error } = await db.from('customers').insert({ name, email, phone, password_hash:hash }).select().single();
    if (error) {
      if (error.code==='23505') throw new Error('Email này đã được đăng ký!');
      throw new Error(error.message);
    }
    setCustomer({ id:data.id, name:data.name, email:data.email, phone:data.phone||'', address:'' });
    showMsg('regOk','🎉 Tạo tài khoản thành công! Đang chuyển trang...');
    setTimeout(() => window.location.href = 'customer-account.html', 900);
  } catch(e) {
    showMsg('regErr','❌ ' + e.message);
    btn.disabled=false; btn.textContent='🚀 Tạo tài khoản';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('formLogin').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
